<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Livros</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h2>Cadastro de Livros</h2>
    <table>
        
        <tr>
            <td><label for="livroID">Livro ID:</label></td>
            <td><input type="text" id="livroID"></td>
        </tr>

        <tr>
            <td><label for="livroTitulo">Título:</label></td>
            <td><input type="text" id="livroTitulo"></td>
        </tr>

        <tr>
            <td><label for="livroAno">Ano de Publicação:</label></td>
            <td><input type="text" id="livroAno"></td>
        </tr>

        <tr>
            <td></td>
            <td><button onclick="efetuarCadastroLivro()">Cadastrar Livro</button></td>
        </tr>

    </table>

    <h3>Listagem das informacoes dos livros</h3>
    <table>
        <thead>
            <tr>
                <th>Livro ID</th>
                <th>Título</th>
                <th>Ano de Publicação</th>
                <th>Ação</th>
            </tr>
        </thead>
        <tbody id="tblListagemBody"></tbody>
    </table>

    <h3>Busca de livro (por titulo):</h3>
    <input type="text" id="inputBuscarTitulo" placeholder="Digite parte do titulo">
    <button onclick="processarBuscaLivroPorTitulo()">Buscar</button>

    <h4>Resultado da busca:</h4>
    <p id="parResultadoBusca">Nenhuma busca foi efetuada ainda.</p>

    <script src="index.js"></script>
</body>
</html>
